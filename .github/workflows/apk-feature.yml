name: Build Android APK (feature)

on:
  push:
    branches:
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/lingua-mini.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingua-mini-apk
          path: artifacts/lingua-mini.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Lingua Mini - Android APK (latest)"
          body: |
            Установочный APK приложения Lingua Mini (карточки, квизы, грамматика, 13 времён включая Future Perfect Continuous, задания на определение времени).

            Как установить:
            1. Скачай lingua-mini.apk ниже на телефон Android.
            2. Открой файл и разреши установку из неизвестных источников.
            3. Готово!

            Это debug-сборка для тестирования (не из Google Play).
          files: artifacts/lingua-mini.apk
          fail_on_unmatched_files: true
